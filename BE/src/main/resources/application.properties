spring.application.name=backend

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST}:5432/postgres?sslmode=require
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Security
jwt.secret=${JWT_SECRET}
jwt.expirationMs=7200000


# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true


# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_NAME:dndkbxr9v}
cloudinary.api-key=${CLOUDINARY_KEY}
cloudinary.api-secret=${CLOUDINARY_SECRET}

# Logging & Misc
app.frontend.base-url=${FRONTEND_URL}
logging.level.root=INFO 
logging.level.com.justsearch.backend.application=DEBUG

#redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=6379
spring.data.redis.password= ${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true

# Dynamic Port (IMPORTANT)
server.port=${PORT:8080}
server.address=0.0.0.0

spring.profiles.active=prod

# resend verification email
brevo.api-key=${BREVO_API_KEY}
brevo.sender-email=${BREVO_SENDER_EMAIL}
brevo.sender-name=${BREVO_SENDER_NAME}